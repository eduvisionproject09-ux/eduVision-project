spring.application.name=eduvisionbackend


# Supabase PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.gbokmjcsddiekdbaaiij
spring.datasource.password=${DB_PASSWORD:your_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:your_jwt_secret_here}
jwt.expiration=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}

# File Upload Configuration (supports book PDF uploads up to 50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Supabase Storage Configuration
supabase.url=https://gbokmjcsddiekdbaaiij.supabase.co
supabase.key=${SUPABASE_KEY:your_supabase_key_here}
supabase.bucket=books
